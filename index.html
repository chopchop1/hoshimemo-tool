<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心理占星術 かんたん診断 | みずきの星メモ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: #0d0f1a;
  color: #e8e4dc;
  min-height: 100vh;
  padding: 2.5rem 1rem;
  position: relative;
  overflow-x: hidden;
}

.stars {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}

.star {
  position: absolute;
  background: #fff;
  border-radius: 50%;
  opacity: 0;
  animation: twinkle var(--dur) ease-in-out infinite var(--delay);
}

@keyframes twinkle {
  0%, 100% { opacity: 0; }
  50% { opacity: var(--op); }
}

.wrap {
  position: relative;
  z-index: 1;
  max-width: 520px;
  margin: 0 auto;
}

.logo {
  text-align: center;
  margin-bottom: 2.5rem;
}

.logo-mark {
  width: 48px;
  height: 48px;
  margin: 0 auto 0.75rem;
}

.logo h1 {
  font-family: 'Noto Serif JP', serif;
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 0.2em;
  color: #a89fc0;
}

.card-main {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 2rem 1.75rem;
}

.card-header {
  text-align: center;
  margin-bottom: 2rem;
}

.card-header h2 {
  font-family: 'Noto Serif JP', serif;
  font-size: 20px;
  font-weight: 400;
  letter-spacing: 0.05em;
  color: #e8e4dc;
  margin-bottom: 0.75rem;
}

.card-header p {
  font-size: 13px;
  color: #8a8499;
  line-height: 1.8;
}

.divider {
  width: 40px;
  height: 1px;
  background: linear-gradient(90deg, transparent, #6b5fa0, transparent);
  margin: 1.25rem auto;
}

.form-group { margin-bottom: 1.25rem; }

label {
  display: block;
  font-size: 12px;
  letter-spacing: 0.1em;
  color: #8a8499;
  margin-bottom: 8px;
}

input[type="date"],
input[type="time"] {
  width: 100%;
  padding: 12px 14px;
  font-size: 15px;
  font-family: 'Noto Sans JP', sans-serif;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  color: #e8e4dc;
  outline: none;
  transition: border-color 0.2s;
  color-scheme: dark;
}

input[type="date"]:focus,
input[type="time"]:focus {
  border-color: rgba(107,95,160,0.6);
}

.note-small {
  font-size: 11px;
  color: #5c5670;
  margin-top: 5px;
  line-height: 1.6;
}

.btn-main {
  width: 100%;
  padding: 14px;
  font-size: 14px;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 500;
  letter-spacing: 0.15em;
  border: 1px solid rgba(107,95,160,0.5);
  border-radius: 10px;
  background: rgba(107,95,160,0.2);
  color: #c4b8e8;
  cursor: pointer;
  margin-top: 0.5rem;
  transition: all 0.2s;
}

.btn-main:hover {
  background: rgba(107,95,160,0.35);
  border-color: rgba(107,95,160,0.8);
  color: #e0d8f5;
}

.result {
  display: none;
  margin-top: 2rem;
}

.result-header {
  text-align: center;
  margin-bottom: 1.5rem;
}

.result-header p {
  font-size: 11px;
  letter-spacing: 0.2em;
  color: #6b5fa0;
}

.planet-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 1.25rem 1.5rem;
  margin-bottom: 1rem;
  position: relative;
  overflow: hidden;
}

.planet-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px;
  height: 100%;
}

.planet-card.sun::before  { background: linear-gradient(180deg, #f5c842, #e8943a); }
.planet-card.moon::before { background: linear-gradient(180deg, #a8c4e8, #7090c0); }
.planet-card.asc::before  { background: linear-gradient(180deg, #8ec4a8, #4a9070); }

.planet-label {
  font-size: 11px;
  letter-spacing: 0.12em;
  margin-bottom: 8px;
}

.sun  .planet-label { color: #c8a040; }
.moon .planet-label { color: #7090c0; }
.asc  .planet-label { color: #4a9070; }

.planet-name {
  font-family: 'Noto Serif JP', serif;
  font-size: 22px;
  font-weight: 400;
  color: #e8e4dc;
  margin-bottom: 8px;
  letter-spacing: 0.05em;
}

.planet-theme {
  font-size: 13px;
  color: #8a8499;
  line-height: 1.8;
}

.cta-card {
  margin-top: 1.5rem;
  padding: 1.5rem;
  background: rgba(107,95,160,0.08);
  border: 1px solid rgba(107,95,160,0.2);
  border-radius: 14px;
  text-align: center;
}

.cta-card p {
  font-size: 13px;
  color: #8a8499;
  line-height: 1.9;
  margin-bottom: 1.25rem;
}

.cta-card a {
  display: inline-block;
  padding: 10px 28px;
  font-size: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 500;
  letter-spacing: 0.1em;
  background: rgba(107,95,160,0.25);
  border: 1px solid rgba(107,95,160,0.5);
  color: #c4b8e8;
  border-radius: 99px;
  text-decoration: none;
  transition: all 0.2s;
}

.cta-card a:hover {
  background: rgba(107,95,160,0.4);
  color: #e0d8f5;
}

.footer {
  text-align: center;
  margin-top: 2rem;
  font-size: 11px;
  color: #3a3650;
  letter-spacing: 0.1em;
}

.footer a { color: #3a3650; text-decoration: none; }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="wrap">
  <div class="logo">
    <svg class="logo-mark" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="24" cy="24" r="20" stroke="#6b5fa0" stroke-width="0.5" opacity="0.4"/>
      <circle cx="24" cy="24" r="13" stroke="#6b5fa0" stroke-width="0.5" opacity="0.3"/>
      <circle cx="24" cy="24" r="2.5" fill="#a89fc0"/>
      <line x1="24" y1="4" x2="24" y2="44" stroke="#6b5fa0" stroke-width="0.5" opacity="0.2"/>
      <line x1="4" y1="24" x2="44" y2="24" stroke="#6b5fa0" stroke-width="0.5" opacity="0.2"/>
      <circle cx="24" cy="4" r="1.5" fill="#c4b8e8" opacity="0.8"/>
      <circle cx="24" cy="44" r="1.5" fill="#c4b8e8" opacity="0.8"/>
      <circle cx="4" cy="24" r="1.5" fill="#c4b8e8" opacity="0.8"/>
      <circle cx="44" cy="24" r="1.5" fill="#c4b8e8" opacity="0.8"/>
      <circle cx="10" cy="10" r="1" fill="#8a8499" opacity="0.6"/>
      <circle cx="38" cy="10" r="1" fill="#8a8499" opacity="0.6"/>
      <circle cx="10" cy="38" r="1" fill="#8a8499" opacity="0.6"/>
      <circle cx="38" cy="38" r="1" fill="#8a8499" opacity="0.6"/>
    </svg>
    <h1>みずきの星メモ</h1>
  </div>

  <div class="card-main">
    <div class="card-header">
      <h2>心理占星術 かんたん診断</h2>
      <div class="divider"></div>
      <p>生年月日を入力すると、太陽星座・月星座・アセンダントの<br>心理的テーマをお伝えします。</p>
    </div>

    <div class="form-group">
      <label>生年月日</label>
      <input type="date" id="birthdate" max="2010-12-31" min="1940-01-01" />
    </div>
    <div class="form-group">
      <label>出生時間（わかる場合）</label>
      <input type="time" id="birthtime" value="12:00" />
      <p class="note-small">わからない場合は12:00のままでOKです（アセンダントは概算になります）</p>
    </div>

    <button class="btn-main" onclick="diagnose()">星を読み解く</button>

    <div class="result" id="result">
      <div class="result-header" style="margin-top:1.75rem;">
        <div class="divider"></div>
        <p>あなたの心理的テーマ</p>
      </div>

      <div class="planet-card sun">
        <div class="planet-label">☀ 太陽星座 — 意識的な自己のテーマ</div>
        <div class="planet-name" id="sun-sign"></div>
        <div class="planet-theme" id="sun-theme"></div>
      </div>

      <div class="planet-card moon">
        <div class="planet-label">☽ 月星座 — 感情・無意識のテーマ</div>
        <div class="planet-name" id="moon-sign"></div>
        <div class="planet-theme" id="moon-theme"></div>
      </div>

      <div class="planet-card asc">
        <div class="planet-label">↑ アセンダント — 外への見せ方のテーマ</div>
        <div class="planet-name" id="asc-sign"></div>
        <div class="planet-theme" id="asc-theme"></div>
      </div>

      <div class="cta-card">
        <p>それぞれの星座が持つ心理的テーマを<br>さらに深く知りたい方へ。<br>みずきの星メモでは、惑星・星座・ハウスを<br>体系的に解説したマガジンを毎週更新しています。</p>
        <a href="https://note.com/hoshimemo" target="_blank">マガジンを読む →</a>
      </div>
    </div>
  </div>

  <div class="footer">
    <a href="https://note.com/hoshimemo">みずきの星メモ</a>
  </div>
</div>

<script>
(function() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 0.5;
    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${3+Math.random()*4}s;--delay:${-Math.random()*6}s;--op:${0.3+Math.random()*0.6};`;
    container.appendChild(s);
  }
})();

const signs = [
  { name: '山羊座', sun: [12,22], end: [1,19] },
  { name: '水瓶座', sun: [1,20],  end: [2,18] },
  { name: '魚座',   sun: [2,19],  end: [3,20] },
  { name: '牡羊座', sun: [3,21],  end: [4,19] },
  { name: '牡牛座', sun: [4,20],  end: [5,20] },
  { name: '双子座', sun: [5,21],  end: [6,20] },
  { name: '蟹座',   sun: [6,21],  end: [7,22] },
  { name: '獅子座', sun: [7,23],  end: [8,22] },
  { name: '乙女座', sun: [8,23],  end: [9,22] },
  { name: '天秤座', sun: [9,23],  end: [10,22] },
  { name: '蠍座',   sun: [10,23], end: [11,21] },
  { name: '射手座', sun: [11,22], end: [12,21] },
];

const themes = {
  '牡羊座': '自己主張・アイデンティティの確立・行動力。「自分らしくある」ことへの強い欲求を持ちやすい傾向があります。',
  '牡牛座': '安定・所有・身体感覚。安心できる環境と、自分のペースを大切にする心理的テーマを持ちます。',
  '双子座': '知識・コミュニケーション・二面性。情報を集め、言葉で世界を理解しようとする傾向があります。',
  '蟹座':   '家族・安心・感情的な保護。深いところで「安心できる場所」を求める心理的テーマを持ちます。',
  '獅子座': '自己表現・承認・創造性。自分らしさを表現し、認めてもらいたいという欲求が根底にあります。',
  '乙女座': '分析・完璧主義・奉仕。細部へのこだわりと、役に立ちたいという感覚が心理的テーマになりやすいです。',
  '天秤座': '調和・関係性・公平さ。他者とのバランスを保つことに強いエネルギーを使う傾向があります。',
  '蠍座':   '深層心理・変容・執着。物事の表面ではなく、深いところを見ようとする強い心理的テーマを持ちます。',
  '射手座': '自由・探求・信念。より広い世界や真理を求めて動こうとする欲求が根底にあります。',
  '山羊座': '目標・責任・社会的達成。着実に積み上げることへの強い意志と、責任感が心理的テーマになります。',
  '水瓶座': '独自性・改革・集合意識。既存の枠にとらわれない視点と、社会全体への関心が特徴的です。',
  '魚座':   '共感・境界線・溶解。他者の感情に敏感で、境界線が曖昧になりやすい心理的テーマを持ちます。',
};

function getSunSign(month, day) {
  for (let s of signs) {
    const [sm, sd] = s.sun;
    const [em, ed] = s.end;
    if ((month === sm && day >= sd) || (month === em && day <= ed)) return s.name;
  }
  return '山羊座';
}

function getMoonSign(date) {
  const epoch = new Date('2000-01-01');
  const days = (date - epoch) / 86400000;
  const phase = ((days % 29.53058867) + 29.53058867) % 29.53058867;
  const order = ['蟹座','獅子座','乙女座','天秤座','蠍座','射手座','山羊座','水瓶座','魚座','牡羊座','牡牛座','双子座'];
  return order[Math.floor((phase / 29.53058867) * 12) % 12];
}

function getAscendant(date, hour) {
  const dayOfYear = Math.floor((date - new Date(date.getFullYear(), 0, 0)) / 86400000);
  const index = Math.floor(((dayOfYear / 365 * 12) + (hour / 2)) % 12);
  const order = ['牡羊座','牡牛座','双子座','蟹座','獅子座','乙女座','天秤座','蠍座','射手座','山羊座','水瓶座','魚座'];
  return order[(index + 12) % 12];
}

function diagnose() {
  const val = document.getElementById('birthdate').value;
  const time = document.getElementById('birthtime').value;
  if (!val) { alert('生年月日を入力してください'); return; }

  const date = new Date(val);
  const month = date.getMonth() + 1;
  const day = date.getDate();
  const hour = time ? parseInt(time.split(':')[0]) : 12;

  const sun  = getSunSign(month, day);
  const moon = getMoonSign(date);
  const asc  = getAscendant(date, hour);

  document.getElementById('sun-sign').textContent  = sun;
  document.getElementById('sun-theme').textContent = themes[sun];
  document.getElementById('moon-sign').textContent  = moon;
  document.getElementById('moon-theme').textContent = themes[moon];
  document.getElementById('asc-sign').textContent  = asc;
  document.getElementById('asc-theme').textContent = themes[asc];

  const result = document.getElementById('result');
  result.style.display = 'block';
  result.scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>
